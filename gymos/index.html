<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Treino">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1419">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>Treino · Hub</title>
<style>
:root{
  --bg:#0f1419;
  --surface:#1a212b;
  --surface-2:#232c38;
  --line:#2d3845;
  --text:#eef2f6;
  --text-dim:#8c9aab;
  --text-faint:#5a6675;
  --accent:#3dd6b5;
  --accent-deep:#1ea98a;
  --accent-soft:rgba(61,214,181,.12);
  --warn:#f2b134;
  --push:#5b9dff;
  --pull:#c77dff;
  --legs:#ff8a5b;
  --plyo:#3dd6b5;
  --radius:16px;
  --radius-sm:11px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);overscroll-behavior:none}
body{padding-bottom:78px;max-width:680px;margin:0 auto;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
::-webkit-scrollbar{width:0;height:0}

/* ---------- Top bar ---------- */
.topbar{position:sticky;top:0;z-index:40;background:rgba(15,20,25,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:14px 18px 12px}
.topbar h1{font-size:20px;font-weight:750;letter-spacing:-.4px}
.topbar .sub{font-size:12.5px;color:var(--text-dim);margin-top:2px;font-weight:500}

/* ---------- Views ---------- */
.view{display:none;padding:16px 14px 24px;animation:fade .28s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ---------- Week strip ---------- */
.weekstrip{display:flex;gap:6px;margin-bottom:18px}
.daycell{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:9px 4px 8px;text-align:center;position:relative}
.daycell .dn{font-size:10px;color:var(--text-faint);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.daycell .dd{font-size:15px;font-weight:700;margin-top:3px}
.daycell.today{border-color:var(--accent);background:var(--accent-soft)}
.daycell.today .dd{color:var(--accent)}
.daycell .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);margin:4px auto 0}
.daycell .dot.empty{background:transparent}

/* ---------- Section heading ---------- */
.sec-label{font-size:12px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.7px;margin:22px 4px 11px;display:flex;align-items:center;gap:8px}
.sec-label:first-child{margin-top:4px}

/* ---------- Workout cards (day selector) ---------- */
.day-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:11px;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden;transition:transform .12s,border-color .15s}
.day-card:active{transform:scale(.985)}
.day-card .bar{position:absolute;left:0;top:0;bottom:0;width:4px}
.day-card .icon{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;flex-shrink:0;font-size:21px;font-weight:800}
.day-card .info{flex:1;min-width:0}
.day-card .info h3{font-size:16.5px;font-weight:700;letter-spacing:-.2px}
.day-card .info p{font-size:12.5px;color:var(--text-dim);margin-top:3px;font-weight:500}
.day-card .chev{color:var(--text-faint);font-size:20px}
.day-card .badge{position:absolute;top:11px;right:13px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:var(--accent-soft);color:var(--accent)}

/* ---------- Accordion ---------- */
.accordion{margin-bottom:11px;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--surface)}
.acc-head{width:100%;display:flex;align-items:center;gap:12px;padding:15px 16px;text-align:left}
.acc-head .tag{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-size:16px;flex-shrink:0}
.acc-head .htxt{flex:1}
.acc-head .htxt .t{font-size:15.5px;font-weight:700;letter-spacing:-.2px}
.acc-head .htxt .s{font-size:11.5px;color:var(--text-dim);margin-top:2px;font-weight:500}
.acc-head .arrow{color:var(--text-faint);transition:transform .25s;font-size:13px}
.acc-head.open .arrow{transform:rotate(90deg)}
.acc-body{max-height:0;overflow:hidden;transition:max-height .32s ease}
.acc-inner{padding:2px 12px 12px}

/* ---------- Exercise row ---------- */
.ex{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--radius-sm);margin-bottom:8px;overflow:hidden}
.ex-head{display:flex;align-items:center;gap:12px;padding:11px 12px}
.ex-thumb{width:44px;height:44px;border-radius:10px;background:#0c1117;flex-shrink:0;overflow:hidden;border:1px solid var(--line)}
.ex-thumb svg{width:100%;height:100%;display:block}
.ex-meta{flex:1;min-width:0}
.ex-meta .nm{font-size:14.5px;font-weight:650;letter-spacing:-.2px;line-height:1.25}
.ex-meta .rg{font-size:11.5px;color:var(--text-dim);margin-top:3px;font-weight:600}
.ex-meta .rg b{color:var(--accent);font-weight:700}
.ex-toggle{width:30px;height:30px;border-radius:8px;background:var(--surface);display:grid;place-items:center;color:var(--text-faint);flex-shrink:0;font-size:12px;transition:transform .2s,color .2s}
.ex-toggle.open{transform:rotate(45deg);color:var(--accent)}
.ex-done-dot{position:absolute;width:7px;height:7px;border-radius:50%;background:var(--accent);right:52px;top:50%;transform:translateY(-50%);opacity:0;transition:opacity .2s}
.ex-head{position:relative}
.ex.completed .ex-done-dot{opacity:1}
.ex.completed .ex-thumb{border-color:var(--accent)}

/* ---------- Exercise detail (expand) ---------- */
.ex-detail{max-height:0;overflow:hidden;transition:max-height .3s ease;background:var(--surface)}
.ex-detail-in{padding:4px 12px 13px}
.cue{font-size:12.5px;color:var(--text-dim);line-height:1.5;background:var(--bg);border-radius:9px;padding:10px 12px;margin-bottom:11px}
.cue b{color:var(--text);font-weight:650}
.vidlink{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--accent);font-weight:600;margin-bottom:11px}
.vidlink-in{display:flex;gap:7px;margin-bottom:12px}
.vidlink-in input{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px 10px;color:var(--text);font-size:12px;font-family:inherit}
.vidlink-in button{background:var(--accent-soft);color:var(--accent);font-weight:700;font-size:12px;padding:0 13px;border-radius:8px}

/* last load + rest recommendation */
.last-load{display:flex;align-items:center;gap:9px;background:var(--bg);border-radius:9px;padding:9px 12px;margin-bottom:8px;flex-wrap:wrap}
.last-load .ll-tag{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);background:var(--accent-soft);padding:3px 7px;border-radius:5px;flex-shrink:0}
.last-load.empty .ll-tag{color:var(--text-faint);background:var(--surface-2)}
.last-load .ll-data{font-size:13px;font-weight:650;color:var(--text);flex:1;font-variant-numeric:tabular-nums}
.last-load.empty .ll-data{color:var(--text-faint);font-weight:500}
.last-load .ll-date{font-size:11px;color:var(--text-faint);font-weight:600}
.rest-rec{font-size:12px;color:var(--text-dim);background:var(--bg);border-radius:9px;padding:8px 12px;margin-bottom:10px;font-weight:500}
.rest-rec b{color:var(--accent);font-weight:700}
.rest-rec .rest-why{color:var(--text-faint);font-size:11px}

/* sets table */
.sets-hd{display:grid;grid-template-columns:30px 1fr 1fr 42px;gap:8px;padding:0 4px 7px;font-size:10.5px;color:var(--text-faint);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.set-row{display:grid;grid-template-columns:30px 1fr 1fr 42px;gap:8px;align-items:center;margin-bottom:7px}
.set-row .snum{width:30px;height:34px;border-radius:8px;background:var(--surface-2);display:grid;place-items:center;font-size:13px;font-weight:700;color:var(--text-dim)}
.set-row input{width:100%;height:34px;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;text-align:center;color:var(--text);font-size:14px;font-weight:600;font-family:inherit}
.set-row input:focus{outline:none;border-color:var(--accent);background:var(--bg)}
.set-row .chk{width:42px;height:34px;border-radius:8px;background:var(--surface-2);border:1px solid var(--line);display:grid;place-items:center;font-size:14px;color:var(--text-faint);transition:all .15s}
.set-row .chk.on{background:var(--accent);color:#06120e;border-color:var(--accent)}
.set-row.done input{border-color:var(--accent-deep)}
.addset{width:100%;padding:8px;border:1px dashed var(--line);border-radius:8px;color:var(--text-dim);font-size:12px;font-weight:600;margin-top:3px}
.addset:active{background:var(--surface-2)}

/* timed exercise (no weight) */
/* timed info — ver perto do fim do CSS */

/* ---------- Rest timer (floating) ---------- */
.rest-fab{position:fixed;left:50%;transform:translateX(-50%);bottom:90px;z-index:60;background:var(--surface-2);color:var(--text);border:1px solid var(--accent);border-radius:18px;padding:0;display:none;flex-direction:column;box-shadow:0 10px 34px rgba(0,0,0,.5);overflow:hidden;width:300px;max-width:calc(100vw - 28px);animation:pop .3s}
.rest-fab.show{display:flex}
@keyframes pop{from{transform:translateX(-50%) scale(.85);opacity:0}to{transform:translateX(-50%) scale(1);opacity:1}}
.rest-prog{height:4px;background:var(--accent);width:100%;transform-origin:left;transition:transform 1s linear}
.rest-main{display:flex;align-items:center;gap:8px;padding:11px 12px}
.rest-fab .rt-center{flex:1;text-align:center}
.rest-fab .rt-label{font-size:10px;color:var(--text-dim);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.rest-fab .rt{font-variant-numeric:tabular-nums;font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1.1;color:var(--accent)}
.rest-fab .rt-ctrl{background:var(--surface);color:var(--text);border:1px solid var(--line);height:38px;min-width:46px;border-radius:10px;font-size:13px;font-weight:700}
.rest-fab .rt-ctrl:active{background:var(--bg)}
.rest-fab .rt-close{background:transparent;color:var(--text-faint);width:30px;height:38px;font-size:16px;font-weight:700}
.rest-fab.done-flash{border-color:var(--warn)}
.rest-fab.done-flash .rt{color:var(--warn)}

/* ---------- Finish bar ---------- */
.finish-bar{position:sticky;bottom:78px;z-index:30;padding:12px 4px 4px}
.finish-btn{width:100%;background:var(--accent);color:#06120e;font-weight:750;font-size:15.5px;padding:15px;border-radius:14px;box-shadow:0 6px 20px rgba(61,214,181,.3);display:flex;align-items:center;justify-content:center;gap:8px}
.finish-btn:active{transform:scale(.99)}
.finish-btn.ghost{background:var(--surface);color:var(--text);box-shadow:none;border:1px solid var(--line)}
.discard-btn{width:100%;background:transparent;color:var(--text-faint);font-size:12.5px;font-weight:600;padding:10px;margin-top:6px}
.discard-btn:active{color:#e8503a}

/* ---------- Resume banner ---------- */
.resume-banner{display:flex;align-items:center;justify-content:space-between;gap:12px;background:linear-gradient(135deg,var(--accent-soft),var(--surface));border:1.5px solid var(--accent);border-radius:var(--radius);padding:14px 16px;margin-bottom:18px;cursor:pointer;transition:transform .12s}
.resume-banner:active{transform:scale(.99)}
.resume-banner .rb-left{display:flex;align-items:center;gap:12px}
.resume-banner .rb-pulse{width:10px;height:10px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(61,214,181,.5)}50%{opacity:.6;box-shadow:0 0 0 7px rgba(61,214,181,0)}}
.resume-banner .rb-title{font-size:14.5px;font-weight:700;color:var(--text)}
.resume-banner .rb-sub{font-size:12px;color:var(--text-dim);margin-top:2px;font-weight:500}
.resume-banner .rb-arrow{font-size:22px;color:var(--accent);font-weight:700}

/* ---------- Back link ---------- */
.backlink{display:inline-flex;align-items:center;gap:6px;color:var(--text-dim);font-size:13.5px;font-weight:600;margin-bottom:4px;padding:4px 0}

/* ---------- Progress ---------- */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px}
.stat .v{font-size:27px;font-weight:800;letter-spacing:-1px;line-height:1}
.stat .l{font-size:11.5px;color:var(--text-dim);margin-top:6px;font-weight:600}
.stat .v.accent{color:var(--accent)}

.hist-item{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:13px 15px;margin-bottom:9px;display:flex;align-items:center;gap:13px}
.hist-item .hdot{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-size:17px;font-weight:800;flex-shrink:0}
.hist-item .hinfo{flex:1}
.hist-item .hinfo .ht{font-size:14.5px;font-weight:700}
.hist-item .hinfo .hs{font-size:12px;color:var(--text-dim);margin-top:2px;font-weight:500}
.hist-item .hvol{text-align:right;font-size:12px;color:var(--text-dim);font-weight:600}
.hist-item .hvol b{display:block;color:var(--accent);font-size:15px;font-weight:750}

.empty{text-align:center;padding:48px 20px;color:var(--text-faint)}
.empty .ei{font-size:40px;margin-bottom:12px;opacity:.5}
.empty p{font-size:13.5px;line-height:1.5}

/* progress chart */
.chart-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:8px}
.chart-card h4{font-size:13px;font-weight:700;margin-bottom:2px}
.chart-card .csub{font-size:11.5px;color:var(--text-dim);margin-bottom:14px;font-weight:500}
.bars{display:flex;align-items:flex-end;gap:7px;height:120px}
.bars .bcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.bars .bcol .bar-fill{width:100%;background:linear-gradient(to top,var(--accent-deep),var(--accent));border-radius:5px 5px 0 0;min-height:3px;transition:height .5s}
.bars .bcol .blab{font-size:9.5px;color:var(--text-faint);font-weight:600}

/* ---------- Bottom nav ---------- */
.botnav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(15,20,25,.92);backdrop-filter:blur(16px);border-top:1px solid var(--line);display:flex;max-width:680px;margin:0 auto;padding:8px 0 max(8px,env(safe-area-inset-bottom))}
.navbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px;color:var(--text-faint)}
.navbtn svg{width:23px;height:23px}
.navbtn span{font-size:10px;font-weight:600}
.navbtn.active{color:var(--accent)}

/* toast */
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);padding:11px 20px;border-radius:24px;font-size:13.5px;font-weight:650;z-index:90;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* settings */
.set-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-bottom:14px}
.set-item{display:flex;align-items:center;gap:13px;padding:15px 16px;border-bottom:1px solid var(--line);width:100%;text-align:left}
.set-item:last-child{border-bottom:none}
.set-item .si-ic{font-size:18px;width:24px;text-align:center}
.set-item .si-tx{flex:1}
.set-item .si-tx .a{font-size:14.5px;font-weight:650}
.set-item .si-tx .b{font-size:11.5px;color:var(--text-dim);margin-top:2px}
.set-item .si-ar{color:var(--text-faint)}

.intro{font-size:12.5px;color:var(--text-dim);line-height:1.55;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:13px 15px;margin-bottom:14px}
.intro b{color:var(--accent)}

/* install steps */
.install-steps{max-height:0;overflow:hidden;transition:max-height .3s ease;font-size:12.5px;color:var(--text-dim);line-height:1.7;background:var(--bg);border-bottom:1px solid var(--line)}
.install-steps.open{max-height:240px;padding:13px 16px}
.install-steps b{color:var(--text);font-weight:650}

/* order hint */
.order-hint{font-size:11.5px;color:var(--text-dim);background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:9px 13px;margin:8px 0 14px;font-weight:600;line-height:1.4}

/* delete button in history */
.hist-item{position:relative}
.hdel{width:34px;height:34px;border-radius:9px;background:var(--surface-2);border:1px solid var(--line);display:grid;place-items:center;font-size:14px;flex-shrink:0;margin-left:2px;opacity:.7;transition:all .15s}
.hdel:active{background:#3a1f1f;border-color:#6b2b2b;opacity:1}

/* demo video link */
.vidlink.demo{display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:9px 12px;margin-bottom:8px;font-size:13px;color:var(--text);font-weight:600;transition:border-color .15s}
.vidlink.demo:active{border-color:var(--accent)}
.vidlink.demo .play{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#06120e;display:grid;place-items:center;font-size:11px;flex-shrink:0}

/* last load indicator */
.last-load{display:flex;align-items:center;gap:9px;background:var(--bg);border-radius:9px;padding:9px 12px;margin-bottom:8px;flex-wrap:wrap}
.last-load .ll-tag{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);background:var(--accent-soft);padding:3px 7px;border-radius:5px;flex-shrink:0}
.last-load.empty .ll-tag{color:var(--text-faint);background:var(--surface-2)}
.last-load .ll-data{font-size:13px;font-weight:650;color:var(--text);flex:1;font-variant-numeric:tabular-nums}
.last-load.empty .ll-data{color:var(--text-faint);font-weight:500}
.last-load .ll-date{font-size:11px;color:var(--text-faint);font-weight:600}

/* rest button (principal — arranca o cronómetro) */
.rest-btn{width:100%;display:flex;align-items:center;gap:10px;background:var(--surface);border:1.5px solid var(--accent);border-radius:11px;padding:11px 14px;margin:10px 0 4px;cursor:pointer;transition:background .15s,transform .1s}
.rest-btn:active{background:var(--accent-soft);transform:scale(.98)}
.rest-btn .rb-icon{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#06120e;display:grid;place-items:center;font-size:12px;font-weight:800;flex-shrink:0}
.rest-btn .rb-text{flex:1;font-size:13.5px;font-weight:650;color:var(--text);text-align:left}
.rest-btn .rb-text b{color:var(--accent)}
.rest-btn .rb-why{font-size:11px;color:var(--text-faint);font-weight:600;background:var(--surface-2);padding:3px 8px;border-radius:6px}

/* quick rest buttons (aquecimento/corretivo/alongamento) */
.quick-rest{display:flex;align-items:center;gap:7px;margin-top:10px;flex-wrap:wrap}
.quick-rest .qr-label{font-size:11.5px;color:var(--text-faint);font-weight:600;margin-right:2px}
.quick-rest button{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:7px 13px;font-size:12.5px;font-weight:700;color:var(--text-dim);cursor:pointer;transition:all .15s}
.quick-rest button:active,.quick-rest button:hover{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}

/* timed info */
.timed-info{display:flex;gap:8px;align-items:center;font-size:13px;color:var(--text-dim);font-weight:600;background:var(--bg);border-radius:9px;padding:10px 12px;margin-bottom:2px}
</style>
</head>
<body>

<div class="topbar">
  <h1 id="barTitle">Olá, Rodrigo 👋</h1>
  <div class="sub" id="barSub">Pronto para treinar?</div>
</div>

<!-- ============ HOME / TODAY ============ -->
<div class="view active" id="view-home"></div>

<!-- ============ SESSION ============ -->
<div class="view" id="view-session"></div>

<!-- ============ PROGRESS ============ -->
<div class="view" id="view-progress"></div>

<!-- ============ MENU ============ -->
<div class="view" id="view-menu"></div>

<!-- Rest timer -->
<div class="rest-fab" id="restFab">
  <div class="rest-prog" id="restProg"></div>
  <div class="rest-main">
    <button class="rt-ctrl" onclick="addRest(-15)" aria-label="Menos 15s">−15</button>

/* ============================================================
   ESTADO + PERSISTÊNCIA (window.storage)
   ============================================================ */
let STATE = {
  log: {},          // { 'YYYY-MM-DD': [ {plan, name, volume, sets} ] }
  current: null,    // sessão ativa
  videos: {},       // { exerciseId: url }
};

const todayKey = ()=> new Date().toISOString().slice(0,10);

/* Camada de persistência:
   - localStorage quando disponível (GitHub Pages, browser normal) → dados ficam no dispositivo
   - window.storage como fallback (ambiente Claude) */
const hasLocalStorage = (()=>{
  try{ const k='__t'; window.localStorage.setItem(k,'1'); window.localStorage.removeItem(k); return true; }
  catch(e){ return false; }
})();

async function loadState(){
  try{
    let raw = null;
    if(hasLocalStorage){
      raw = window.localStorage.getItem('treino_state');
    } else if(window.storage){
      const r = await window.storage.get('treino_state');
      raw = r && r.value;
    }
    if(raw){ STATE = JSON.parse(raw); }
  }catch(e){ /* primeira utilização */ }
  if(!STATE.log) STATE.log = {};
  if(!STATE.videos) STATE.videos = {};
  if(!STATE.lastLoads) STATE.lastLoads = {};
}
async function saveState(){
  try{
    const data = JSON.stringify(STATE);
    if(hasLocalStorage){
      window.localStorage.setItem('treino_state', data);
    } else if(window.storage){
      await window.storage.set('treino_state', data);
    }
  }catch(e){ console.error('save failed', e); }
}

function nav(v){
  $$('.view').forEach(x=>x.classList.remove('active'));
  $('#view-'+v).classList.add('active');
  $$('.navbtn').forEach(b=>b.classList.toggle('active', b.dataset.view===v));

  if(v==='progress') renderProgress();
  if(v==='menu') renderMenu();
  window.scrollTo(0,0);
}

   ============================================================ */
function weekStrip(){
  const now = new Date();
  const dow = (now.getDay()+6)%7; // segunda=0
  let html = '<div class="weekstrip">';
  for(let i=0;i<7;i++){
    const d = new Date(now); d.setDate(now.getDate()-dow+i);
    const key = d.toISOString().slice(0,10);
    const trained = STATE.log[key] && STATE.log[key].length>0;
    const isToday = key===todayKey();
    html += `<div class="daycell ${isToday?'today':''}">
      <div class="dn">${WD[d.getDay()]}</div>
      <div class="dd">${d.getDate()}</div>
      <div class="dot ${trained?'':'empty'}"></div>
    </div>`;
  }
  return html+'</div>';
}

  html += `<div class="sec-label">💪 Treino de Força (PPL)</div>`;

/* ============================================================
   SESSÃO
   ============================================================ */
function getPlan(key){
  if(key.startsWith('plyo_')) return {type:'plyo', data:PLYO[key.slice(5)], key};
  return {type:'strength', data:STRENGTH[key], key};
}

function openSession(key, forceNew){
  const plan = getPlan(key);
  // se já existe uma sessão em curso para este treino, retoma-a
  if(!forceNew && STATE.current && STATE.current.key===key){
    // mantém a sessão existente (retoma)
  } else if(!forceNew && STATE.current && STATE.current.key!==key && hasProgress(STATE.current)){
    // há outra sessão em curso com progresso — avisa
    const otherName = getPlan(STATE.current.key).data.name;
    if(confirm(`Tens um treino "${otherName}" a meio com progresso registado.\n\nOK = guardar esse progresso e começar "${plan.data.name}"\nCancelar = voltar ao treino "${otherName}"`)){
      STATE.current = { key, started:Date.now(), sets:{} };
    } else {
      key = STATE.current.key; // volta ao treino anterior
    }
  } else {
    // inicia sessão nova
    STATE.current = { key, started:Date.now(), sets:{} };
  }
  saveState();
  renderSession();
  nav('session');
  $$('.navbtn').forEach(b=>b.classList.remove('active'));
}

function hasProgress(session){
  if(!session || !session.sets) return false;
  for(const exid in session.sets){
    if(session.sets[exid].some(s=> s.w || s.r || s.done)) return true;
  }
  return false;
}

function resumeSession(){
  if(STATE.current){
    renderSession();
    nav('session');
    $$('.navbtn').forEach(b=>b.classList.remove('active'));
  }
}

function exThumb(ex){
  const m = ex.m || [];
  if(ex.front===0) return bodyBackSVG(m);
  // pliometria (sem grupos definidos) → corpo inteiro pernas destacadas
  if(!ex.m) return bodySVG(['quads','glutes','calves']);
  return bodySVG(m);
}

function renderSession(){
  const cur = STATE.current;
  if(!cur){ nav('home'); return; }
  const plan = getPlan(cur.key);
  const support = plan.type==='strength' ? SUPPORT[cur.key] : SUPPORT['legs']; // pliometria usa suporte de pernas
  const d = plan.data;

  $('#barTitle').textContent = d.name;
  $('#barSub').textContent = plan.type==='strength' ? 'Treino de força' : d.sub;

  let html = `<button class="backlink" onclick="nav('home')">‹ Voltar</button>`;
  html += `<div class="order-hint">Ordem do treino: Aquecimento → ${plan.type==='strength'?'Força':'Pliometria'} → Corretivo → Alongamento</div>`;

  const mainLabel = plan.type==='strength' ? '💪 Força' : '⚡ Pliometria';
  const mainCards = d.exercises.map((ex,i)=> exerciseCard(ex, i, plan.type)).join('');

  // 1º AQUECIMENTO (aberto — é por onde começas)
  if(support){
    html += accordion('🔥 1 · Aquecimento', 'Mobilidade + ativação', support.warmup.length+' exercícios', 'var(--warn)',
      support.warmup.map(s=>supportCard(s)).join(''), true);
  }
  // 2º TREINO PRINCIPAL
  html += accordion(`${plan.type==='strength'?'💪':'⚡'} 2 · ${plan.type==='strength'?'Força':'Pliometria'}`, d.name, d.exercises.length+' exercícios', d.color||'var(--accent)',
    mainCards, false);
  // 3º CORRETIVO
  if(support){
    html += accordion('🩹 3 · Corretivo', 'Estabilidade', support.corrective.length+' exercícios', 'var(--accent)',
      support.corrective.map(s=>supportCard(s)).join(''), false);
    // 4º ALONGAMENTO
    html += accordion('🧘 4 · Alongamento', 'Flexibilidade', support.stretch.length+' alongamentos', 'var(--push)',
      support.stretch.map(s=>supportCard(s)).join(''), false);
  }

  html += `<div class="finish-bar">
    <button class="finish-btn" onclick="finishSession()">✓ Terminar treino</button>
    <button class="discard-btn" onclick="discardSession()">Descartar treino sem guardar</button>
  </div>`;

  $('#view-session').innerHTML = html;
  bindAccordions();
}

function accordion(label, title, sub, color, inner, open){
  return `<div class="accordion">
    <button class="acc-head ${open?'open':''}" onclick="toggleAcc(this)">
      <div class="tag" style="background:${color}22;color:${color};font-weight:800">${label.split(' ')[0]}</div>
      <div class="htxt"><div class="t">${label.slice(label.indexOf(' ')+1)}</div><div class="s">${sub}</div></div>
      <div class="arrow">▶</div>
    </button>
    <div class="acc-body" ${open?'style="max-height:6000px"':''}><div class="acc-inner">${inner}</div></div>
  </div>`;
}

function exerciseCard(ex, idx, type){
  const cur = STATE.current;
  const saved = cur.sets[ex.id] || [];
  const isWeight = (type==='strength');
  return `<div class="ex" id="ex-${ex.id||'pl'+idx}" data-exid="${ex.id||'pl'+idx}">
    <div class="ex-head" onclick="toggleEx(this)">
      <div class="ex-thumb">${exThumb(ex)}</div>
      <div class="ex-meta">
        <div class="nm">${ex.n}</div>
        <div class="rg">${isWeight ? '<b>'+ex.range+'</b>' : ex.t}</div>
      </div>
      <div class="ex-done-dot"></div>
      <div class="ex-toggle">+</div>
    </div>
    <div class="ex-detail"><div class="ex-detail-in">
      <div class="cue">${ex.cue}</div>
      ${videoBlock(ex.id||'pl'+idx, ex.n)}
      ${ isWeight ? setsBlock(ex) : timedBlock(ex, type) }
    </div></div>
  </div>`;
}

function timedBlock(ex, type){
  // pliometria: descanso longo (recuperação p/ potência). 150s default.
  const rest = type==='plyo' ? 150 : 60;
  const rm = Math.floor(rest/60), rs = rest%60;
  const restStr = rm>0 ? `${rm}min${rs>0?' '+rs+'s':''}` : `${rs}s`;
  return `<div class="timed-info">⏱ ${ex.t}</div>
    <button class="rest-btn" onclick="startRest(${rest}, '${esc(ex.n)}')">
      <span class="rb-icon">▶</span>
      <span class="rb-text">Iniciar descanso · <b>${restStr}</b></span>
      <span class="rb-why">${type==='plyo'?'recuperação':'curto'}</span>
    </button>`;
}

function supportCard(s){
  const vid = 'sup_'+s.n.replace(/[^a-z0-9]/gi,'').slice(0,12);
  return `<div class="ex">
    <div class="ex-head" onclick="toggleEx(this)">
      <div class="ex-thumb" style="display:grid;place-items:center;color:var(--accent);font-size:18px">●</div>
      <div class="ex-meta"><div class="nm">${s.n}</div><div class="rg">${s.t}</div></div>
      <div class="ex-toggle">+</div>
    </div>
    <div class="ex-detail"><div class="ex-detail-in">
      <div class="cue">${s.cue}</div>
      ${videoBlock(vid, s.n)}
      <div class="quick-rest">
        <span class="qr-label">Descanso rápido:</span>
        <button onclick="startRest(30, '${esc(s.n)}')">30s</button>
        <button onclick="startRest(45, '${esc(s.n)}')">45s</button>
        <button onclick="startRest(60, '${esc(s.n)}')">60s</button>
      </div>
    </div></div>
  </div>`;
}

function videoBlock(id, exName){
  const custom = STATE.videos[id];
  // link de demonstração automático (pesquisa YouTube direcionada)
  const q = encodeURIComponent((exName||'')+' exercise proper form');
  const demoUrl = `https://www.youtube.com/results?search_query=${q}`;
  let html = `<a class="vidlink demo" href="${custom||demoUrl}" target="_blank" rel="noopener">
      <span class="play">▶</span> ${custom?'Ver vídeo guardado':'Ver demonstração'}
    </a>`;
  html += `<div class="vidlink-in">
      <input id="v_${id}" value="${custom||''}" placeholder="Ou cola o teu link de vídeo">
      <button onclick="saveVideo('${id}')">Guardar</button>
    </div>`;
  return html;
}

function setsBlock(ex){
  const cur = STATE.current;
  if(!cur.sets[ex.id]){
    cur.sets[ex.id] = Array.from({length:ex.sets},()=>({w:'',r:'',done:false}));
  }
  const rows = cur.sets[ex.id].map((s,i)=>`
    <div class="set-row ${s.done?'done':''}" data-set="${i}">
      <div class="snum">${i+1}</div>
      <input type="number" inputmode="decimal" placeholder="kg" value="${s.w}" onchange="updSet('${ex.id}',${i},'w',this.value)">
      <input type="number" inputmode="numeric" placeholder="reps" value="${s.r}" onchange="updSet('${ex.id}',${i},'r',this.value)">
      <button class="chk ${s.done?'on':''}" onclick="toggleSet('${ex.id}',${i},this)">✓</button>
    </div>`).join('');

  // indicador última carga
  const last = STATE.lastLoads && STATE.lastLoads[ex.id];
  let lastHtml = '';
  if(last && last.sets && last.sets.length){
    const summary = last.sets.map(x=>`${x.w||'–'}kg×${x.r||'–'}`).join('  ·  ');
    const d = new Date(last.when);
    lastHtml = `<div class="last-load">
      <span class="ll-tag">Última vez</span>
      <span class="ll-data">${summary}</span>
      <span class="ll-date">${d.getDate()}/${d.getMonth()+1}</span>
    </div>`;
  } else {
    lastHtml = `<div class="last-load empty"><span class="ll-tag">Primeira vez</span><span class="ll-data">Regista a tua carga inicial</span></div>`;
  }

  // tempo de descanso recomendado — botão que arranca o cronómetro
  const rest = ex.rest || 120;
  const rm = Math.floor(rest/60), rs = rest%60;
  const restStr = rm>0 ? `${rm}min${rs>0?' '+rs+'s':''}` : `${rs}s`;
  const why = rest>=150?'composto':rest>=100?'multi-articular':'isolamento';
  const restHtml = `<button class="rest-btn" onclick="startRest(${rest}, '${esc(ex.n)}')">
      <span class="rb-icon">▶</span>
      <span class="rb-text">Iniciar descanso · <b>${restStr}</b></span>
      <span class="rb-why">${why}</span>
    </button>`;

  return `${lastHtml}${restHtml}
    <div class="sets-hd"><div></div><div>Peso</div><div>Reps</div><div></div></div>
    ${rows}
    <button class="addset" onclick="addSet('${ex.id}',this)">+ Adicionar série</button>`;
}

/* ---- interações sets ---- */
function updSet(exid, i, field, val){
  STATE.current.sets[exid][i][field] = val;
  saveState();
}
function toggleSet(exid, i, btn){
  const s = STATE.current.sets[exid][i];
  s.done = !s.done;
  btn.classList.toggle('on', s.done);
  btn.closest('.set-row').classList.toggle('done', s.done);
  updateExDone(exid);
  if(s.done){
    const ex = findEx(exid);
    const rest = ex.rest || 120;
    startRest(rest, ex.n);
  }
  saveState();
}
function updateExDone(exid){
  const sets = STATE.current.sets[exid]||[];
  const allDone = sets.length>0 && sets.every(s=>s.done);
  const card = document.querySelector(`[data-exid="${exid}"]`);
  if(card) card.classList.toggle('completed', allDone);
}
function addSet(exid, btn){
  STATE.current.sets[exid].push({w:'',r:'',done:false});
  // re-render apenas o bloco de sets
  const detail = btn.closest('.ex-detail-in');
  const ex = findEx(exid);
  // rebuild sets area
  const tmp = document.createElement('div');
  tmp.innerHTML = setsBlock(ex);
  // substitui a partir do sets-hd
  const old = detail.querySelector('.sets-hd');
  while(old.nextSibling) old.nextSibling.remove();
  old.remove();
  detail.insertAdjacentHTML('beforeend', tmp.innerHTML);
  saveState();
  // reabre altura
  const body = detail.closest('.ex-detail');
  body.style.maxHeight = body.scrollHeight+200+'px';
}
function findEx(exid){
  for(const k in STRENGTH){
    const e = STRENGTH[k].exercises.find(x=>x.id===exid);
    if(e) return e;
  }
  return {id:exid,sets:3};
}

function saveVideo(id){
  const inp = document.getElementById('v_'+id);
  if(!inp) return;
  const url = inp.value.trim();
  if(url){ STATE.videos[id]=url; toast('Vídeo guardado'); }
  else { delete STATE.videos[id]; }
  saveState();
}

/* ============================================================
   REST TIMER
   ============================================================ */
let restInt=null, restLeft=0, restTotal=0, audioCtx=null;

function playBeep(){
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    // 3 beeps curtos ascendentes
    [0,0.18,0.36].forEach((delay,i)=>{
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type='sine';
      osc.frequency.value = 660 + i*220; // tom sobe a cada beep
      gain.gain.setValueAtTime(0.001, audioCtx.currentTime+delay);
      gain.gain.exponentialRampToValueAtTime(0.4, audioCtx.currentTime+delay+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+delay+0.15);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(audioCtx.currentTime+delay);
      osc.stop(audioCtx.currentTime+delay+0.16);
    });
  }catch(e){ /* áudio indisponível */ }
}

function startRest(sec, label){
  // "acorda" o áudio no gesto do utilizador (necessário em mobile)
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
  }catch(e){}
  restLeft = sec; restTotal = sec;
  const fab = $('#restFab');
  fab.classList.add('show');
  fab.classList.remove('done-flash');
  $('#restLabel').textContent = label ? ('Descanso · '+label) : 'Descanso';
  updRest();
  clearInterval(restInt);
  restInt = setInterval(()=>{
    restLeft--;
    updRest();
    if(restLeft<=0){
      clearInterval(restInt);
      $('#restFab').classList.add('done-flash');
      $('#restTime').textContent = 'Vai!';
      toast('Descanso terminado 💪');
      playBeep();
      if(navigator.vibrate) navigator.vibrate([200,100,200]);
      setTimeout(()=>{ if(restLeft<=0) stopRest(); }, 4000);
    }
  },1000);
}
function updRest(){
  const m = Math.floor(restLeft/60), s = restLeft%60;
  $('#restTime').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  const prog = $('#restProg');
  if(prog && restTotal>0){
    const pct = Math.max(0, restLeft/restTotal);
    prog.style.transform = `scaleX(${pct})`;
  }
}
function addRest(s){
  restLeft = Math.max(0, restLeft+s);
  if(restLeft>restTotal) restTotal = restLeft;
  if(restLeft>0) $('#restFab').classList.remove('done-flash');
  updRest();
}
function stopRest(){ clearInterval(restInt); $('#restFab').classList.remove('show','done-flash'); }

/* ============================================================
   FINISH
   ============================================================ */
function finishSession(){
  const cur = STATE.current;
  if(!cur){ nav('home'); return; }
  const plan = getPlan(cur.key);
  // calcula volume + guarda última carga por exercício
  let volume=0, totalSets=0;
  if(!STATE.lastLoads) STATE.lastLoads = {};
  for(const exid in cur.sets){
    const sets = cur.sets[exid];
    let exHasData = false;
    sets.forEach(s=>{
      if(s.done){ totalSets++; volume += (parseFloat(s.w)||0)*(parseInt(s.r)||0); }
      if(s.w || s.r) exHasData = true;
    });
    // guarda como última carga se houver dados registados
    if(exHasData){
      STATE.lastLoads[exid] = {
        sets: sets.filter(s=>s.w||s.r).map(s=>({w:s.w, r:s.r})),
        when: Date.now(),
      };
    }
  }
  const key = todayKey();
  if(!STATE.log[key]) STATE.log[key]=[];
  STATE.log[key].push({
    plan: cur.key,
    name: plan.data.name,
    color: plan.data.color||'var(--accent)',
    icon: plan.data.icon||'⚡',
    volume: Math.round(volume),
    sets: totalSets,
    when: Date.now(),
  });
  STATE.current = null;
  stopRest();
  saveState();
  toast('Treino registado! 🎉');
  nav('home');
}

function discardSession(){
  if(confirm('Descartar este treino? O progresso registado nesta sessão será apagado e não vai para o histórico.')){
    STATE.current = null;
    stopRest();
    saveState();
    toast('Treino descartado');
    nav('home');
  }
}


/* ============================================================
   PROGRESSO
   ============================================================ */
function renderProgress(){
  $('#barTitle').textContent='Progresso';
  $('#barSub').textContent='O teu histórico de treinos';

  const allSessions=[];
  for(const date in STATE.log){
    STATE.log[date].forEach(s=> allSessions.push({...s,date}));
  }
  allSessions.sort((a,b)=> b.when-a.when);

  // stats
  const totalSessions = allSessions.length;
  const thisWeek = countThisWeek();
  const streak = calcStreak();
  const totalVol = allSessions.reduce((a,s)=>a+s.volume,0);

  let html = `<div class="stat-grid">
    <div class="stat"><div class="v accent">${thisWeek}</div><div class="l">Treinos esta semana</div></div>
    <div class="stat"><div class="v">${totalSessions}</div><div class="l">Treinos no total</div></div>
    <div class="stat"><div class="v">${streak}</div><div class="l">Dias seguidos (semana)</div></div>
    <div class="stat"><div class="v">${(totalVol/1000).toFixed(1)}t</div><div class="l">Volume total levantado</div></div>
  </div>`;

  // chart: últimas 6 semanas (nº treinos)
  html += weekChart();

  // histórico
  html += `<div class="sec-label">Histórico</div>`;
  if(allSessions.length===0){
    html += `<div class="empty"><div class="ei">📋</div><p>Ainda não registaste treinos.<br>Começa pelo separador <b>Hoje</b>.</p></div>`;
  } else {
    allSessions.slice(0,30).forEach(s=>{
      const d = new Date(s.date+'T12:00');
      html += `<div class="hist-item">
        <div class="hdot" style="background:${s.color}22;color:${s.color}">${s.icon}</div>
        <div class="hinfo"><div class="ht">${s.name}</div><div class="hs">${WD[d.getDay()]}, ${d.getDate()} ${MON[d.getMonth()]} · ${s.sets} séries</div></div>
        <div class="hvol"><b>${s.volume>0?(s.volume>=1000?(s.volume/1000).toFixed(1)+'t':s.volume+'kg'):'—'}</b>volume</div>
        <button class="hdel" onclick="deleteSession('${s.date}',${s.when})" aria-label="Apagar treino">🗑</button>
      </div>`;
    });
  }

  $('#view-progress').innerHTML = html;
}

function countThisWeek(){
  const now=new Date(); const dow=(now.getDay()+6)%7;
  const monday=new Date(now); monday.setDate(now.getDate()-dow); monday.setHours(0,0,0,0);
  let c=0;
  for(const date in STATE.log){
    const d=new Date(date+'T12:00');
    if(d>=monday) c+=STATE.log[date].length;
  }
  return c;
}
function calcStreak(){
  // dias distintos treinados esta semana
  const now=new Date(); const dow=(now.getDay()+6)%7;
  const monday=new Date(now); monday.setDate(now.getDate()-dow); monday.setHours(0,0,0,0);
  let days=new Set();
  for(const date in STATE.log){
    const d=new Date(date+'T12:00');
    if(d>=monday && STATE.log[date].length>0) days.add(date);
  }
  return days.size;
}
function weekChart(){
  const weeks=[];
  const now=new Date();
  for(let w=5;w>=0;w--){
    const ref=new Date(now); ref.setDate(now.getDate()-w*7);
    const dow=(ref.getDay()+6)%7;
    const monday=new Date(ref); monday.setDate(ref.getDate()-dow); monday.setHours(0,0,0,0);
    const sunday=new Date(monday); sunday.setDate(monday.getDate()+7);
    let count=0;
    for(const date in STATE.log){
      const d=new Date(date+'T12:00');
      if(d>=monday && d<sunday) count+=STATE.log[date].length;
    }
    weeks.push({count, label: w===0?'Esta':(monday.getDate()+'/'+(monday.getMonth()+1))});
  }
  const max=Math.max(4,...weeks.map(w=>w.count));
  const bars=weeks.map(w=>`<div class="bcol">
    <div class="bar-fill" style="height:${(w.count/max*100)}%"></div>
    <div class="blab">${w.label}</div>
  </div>`).join('');
  return `<div class="chart-card">
    <h4>Frequência de treino</h4>
    <div class="csub">Treinos por semana (últimas 6)</div>
    <div class="bars">${bars}</div>
  </div>`;
}

/* ============================================================
   MENU
   ============================================================ */
function deleteSession(date, when){
  if(!confirm('Apagar este treino do histórico?')) return;
  if(STATE.log[date]){
    STATE.log[date] = STATE.log[date].filter(s=> s.when!==when);
    if(STATE.log[date].length===0) delete STATE.log[date];
    saveState();
    toast('Treino apagado');
    renderProgress();
  }
}

function toggleInstall(which){
  const el = document.getElementById('ins-'+which);
  if(el) el.classList.toggle('open');
}

function exportData(){
  const data = JSON.stringify({log:STATE.log, videos:STATE.videos, lastLoads:STATE.lastLoads});
  navigator.clipboard?.writeText(data).then(
    ()=>toast('Dados copiados para a área de transferência'),
    ()=>prompt('Copia os teus dados:', data)
  );
}
function importData(){
  const raw = prompt('Cola aqui os dados exportados:');
  if(!raw) return;
  try{
    const d = JSON.parse(raw);
    if(d.log) STATE.log = {...STATE.log, ...d.log};
    if(d.videos) STATE.videos = {...STATE.videos, ...d.videos};
    if(d.lastLoads) STATE.lastLoads = {...STATE.lastLoads, ...d.lastLoads};
    saveState(); toast('Dados importados ✓'); renderMenu();
  }catch(e){ toast('Dados inválidos'); }
}
function resetData(){
  if(confirm('Apagar todo o histórico de treinos? Não pode ser desfeito.')){
    STATE.log={}; saveState(); toast('Histórico limpo'); renderProgress();
  }
}
