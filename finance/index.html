<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <title>Finanças</title>
  <meta name="theme-color" content="#f6f6f4" />

<body>
  <header class="topbar">
    <div><h1 id="title">Finanças</h1><div class="sub" id="subtitle"></div></div>
    <div class="spacer"></div>
    <button class="btn btn-icon btn-ghost" id="settingsBtn" aria-label="Definições">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9 2 2 0 1 1-2.8 2.8 1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5 2 2 0 1 1-4 0 1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.9.3 2 2 0 1 1-2.8-2.8 1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1 2 2 0 1 1 0-4 1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.9 2 2 0 1 1 2.8-2.8 1.7 1.7 0 0 0 1.9.3H9a1.7 1.7 0 0 0 1-1.5 2 2 0 1 1 4 0 1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3 2 2 0 1 1 2.8 2.8 1.7 1.7 0 0 0-.3 1.9V9a1.7 1.7 0 0 0 1.5 1 2 2 0 1 1 0 4 1.7 1.7 0 0 0-1.5 1z"/></svg>

  </header>

  <main class="app">
    <div class="seg" id="tabs" style="margin:16px 0 4px">
      <button data-tab="resumo" class="active">Resumo</button>
      <button data-tab="tx">Movimentos</button>
      <button data-tab="budgets">Orçamentos</button>
      <button data-tab="savings">Poupança</button>
      <button data-tab="net">Património</button>
    </div>
    <div id="view"></div>
  </main>

  <script src="../shared/ui.js"></script>
  <script src="../shared/store.js"></script>
  <script src="../shared/sync.js"></script>
  <script src="../shared/domain.js"></script>
  <script src="../shared/gcal.js"></script>
  <script src="../shared/app.js"></script>
  <script src="./finance.js"></script>
</body>
</html>
