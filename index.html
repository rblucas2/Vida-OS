<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <title>Vida OS</title>
  <meta name="theme-color" content="#0e0f13" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./shared/base.css" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-180.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <style>
    :root{ --accent:#3b6ef5; --accent-2:#6a4bff; --mono:"JetBrains Mono", ui-monospace, monospace; }
    .wrap{ width:100%; max-width: 1240px; margin:0 auto; flex:1 1 auto; padding: 0 16px 28px; }
    @media(max-width:759px){ .navpills{ display:none } }

    /* Top bar */
    .osbar{ display:flex; align-items:center; gap:14px; padding:16px 4px 14px; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10;
      background: color-mix(in srgb, var(--bg) 80%, transparent); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); flex-wrap:wrap; }
    .osbar .brand{ font-family:var(--mono); font-weight:700; letter-spacing:.12em; font-size:.82rem; display:flex; align-items:center; gap:8px; }
    .osbar .brand .glow{ width:9px;height:9px;border-radius:50%;background:var(--accent-grad); box-shadow:0 0 10px var(--accent); }
    .osbar .spacer{ flex:1; }
    .osbar .meta{ font-family:var(--mono); font-size:.72rem; color:var(--text-soft); letter-spacing:.06em; display:flex; gap:14px; align-items:center; }
    .osbar .meta b{ color:var(--text); font-weight:700; }
    .navpills{ display:flex; gap:6px; flex-wrap:wrap; }
    .navpills a{ font-family:var(--mono); font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; text-decoration:none; color:var(--text-soft);
      border:1px solid var(--border); padding:6px 11px; border-radius:8px; transition:.15s; }
    .navpills a:hover, .navpills a.on{ color:var(--accent); border-color:var(--accent); }

    /* Grid */
    .dash{ display:grid; grid-template-columns:repeat(12,1fr); gap:14px; margin-top:16px; }
    .panel{ grid-column: span 12; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:16px; position:relative; box-shadow:var(--sh-1); }
    .panel > .ph{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .panel .lbl{ font-family:var(--mono); font-size:.6rem; letter-spacing:.16em; text-transform:uppercase; color:var(--text-mute); font-weight:700; }
    .panel .lbl .ix{ color:var(--accent); }
    .panel .phmeta{ font-family:var(--mono); font-size:.64rem; color:var(--text-mute); letter-spacing:.08em; }
    @media(min-width:760px){
      .c3{ grid-column: span 3 } .c4{ grid-column: span 4 } .c5{ grid-column: span 5 }
      .c6{ grid-column: span 6 } .c7{ grid-column: span 7 } .c8{ grid-column: span 8 } .c9{ grid-column: span 9 }
    }
    @media(min-width:560px) and (max-width:759px){ .c3,.c4,.c5{ grid-column: span 6 } .c6,.c7,.c8,.c9{ grid-column: span 12 } }

    /* Elements */
    .greet{ font-size:1.7rem; font-weight:800; letter-spacing:-.02em; }
    .greet em{ color:var(--accent); font-style:normal; }
    .clock{ font-family:var(--mono); font-weight:700; font-size:2.1rem; letter-spacing:.02em; line-height:1; }
    .clock .s{ color:var(--text-mute); font-size:1.1rem; }
    .statline{ display:flex; gap:20px; flex-wrap:wrap; }
    .stat .n{ font-family:var(--font-num); font-weight:800; font-size:1.35rem; letter-spacing:-.02em; }
    .stat .l{ font-family:var(--mono); font-size:.6rem; letter-spacing:.1em; text-transform:uppercase; color:var(--text-mute); }
    .avatar{ width:44px;height:44px;border-radius:12px;background:var(--accent-grad);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.2rem; }
    .caprow{ display:flex; gap:8px; }
    .caprow input{ font-family:inherit; }
    .hbig{ font-family:var(--font-num); font-weight:850; font-size:2rem; letter-spacing:-.03em; }
    .checkline{ display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
    .checkline:last-child{ border-bottom:0; }
    .cbx{ width:22px;height:22px;border-radius:7px;border:2px solid var(--border-2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none;color:#fff;font-size:.72rem; }
    .cbx.on{ background:var(--accent-grad); border-color:transparent; }
    .checkline .tx{ flex:1; font-size:.9rem; }
    .checkline.done .tx{ color:var(--text-mute); text-decoration:line-through; }
    .mini-macros{ display:flex; gap:6px; margin-top:8px; }
    .mini-macros .mm{ flex:1; text-align:center; background:var(--surface-2); border-radius:8px; padding:6px 2px; }
    .mini-macros .mm .v{ font-family:var(--font-num); font-weight:800; font-size:.92rem; }
    .mini-macros .mm .k{ font-size:.56rem; color:var(--text-mute); text-transform:uppercase; letter-spacing:.06em; }
    .goalrow{ display:flex; align-items:center; gap:8px; margin-top:8px; }
    .goalrow input{ padding:9px 11px; }
    .applink2{ text-decoration:none; color:inherit; }
    .schedule .s-item{ display:flex; gap:12px; padding:7px 0; border-bottom:1px solid var(--border); font-size:.88rem; }
    .schedule .s-item:last-child{ border-bottom:0; }
    .schedule .s-item .tm{ font-family:var(--mono); font-size:.72rem; color:var(--text-soft); min-width:56px; text-transform:uppercase; }
    .emptymini{ color:var(--text-mute); font-size:.82rem; padding:8px 0; }
    .habgrid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .habcard{ display:flex; align-items:center; gap:9px; padding:10px; border:1px solid var(--border); border-radius:11px; background:var(--surface-2); cursor:pointer; transition:.15s; }
    .habcard.on{ border-color:var(--accent); background:var(--accent-soft); }
    .habcard .grow{ min-width:0; }
    .habcard .nm{ font-weight:600; font-size:.84rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .dscore{ font-family:var(--font-num); font-weight:850; font-size:2.4rem; letter-spacing:-.03em; line-height:1; }
    .meal-item{ display:flex; gap:10px; align-items:center; padding:7px 0; border-bottom:1px solid var(--border); }
    .meal-item:last-child{ border-bottom:0; }
    .meal-item .tm{ font-family:var(--mono); font-size:.68rem; color:var(--text-soft); }
    .logbar{ display:flex; gap:8px; margin-top:10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="osbar">
      <div class="brand"><span class="glow"></span> VIDA OS <span style="color:var(--text-mute)">// v1</span></div>
      <div class="spacer"></div>
      <button class="btn btn-icon btn-ghost" id="settingsBtn" aria-label="Definições" style="width:34px;height:34px">
        <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9 2 2 0 1 1-2.8 2.8 1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5 2 2 0 1 1-4 0 1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.9.3 2 2 0 1 1-2.8-2.8 1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1 2 2 0 1 1 0-4 1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.9 2 2 0 1 1 2.8-2.8 1.7 1.7 0 0 0 1.9.3H9a1.7 1.7 0 0 0 1-1.5 2 2 0 1 1 4 0 1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3 2 2 0 1 1 2.8 2.8 1.7 1.7 0 0 0-.3 1.9V9a1.7 1.7 0 0 0 1.5 1 2 2 0 1 1 0 4 1.7 1.7 0 0 0-1.5 1z"/></svg>
      </button>
    </header>
    <div class="dash" id="dash"></div>
  </div>

  <script src="./shared/ui.js"></script>
  <script src="./shared/store.js"></script>
  <script src="./shared/sync.js"></script>
  <script src="./shared/domain.js"></script>
  <script src="./shared/gcal.js"></script>
  <script src="./shared/app.js"></script>
  <script src="./dashboard.js"></script>
</body>
</html>
